<svg width="680" height="660" viewBox="0 0 680 660" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:Arial,sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>

  <rect x="255" y="20" width="170" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="340" y="46" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C2C2A">Start / Receive Input</text>

  <line x1="340" y1="64" x2="340" y2="94" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="220" y="94" width="240" height="56" rx="8" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="340" y="117" text-anchor="middle" font-size="12" font-weight="bold" fill="#3C3489">Intent Classifier Node</text>
  <text x="340" y="136" text-anchor="middle" font-size="10" fill="#534AB7">LLM prompt → one of 3 labels</text>

  <line x1="280" y1="150" x2="115" y2="190" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="340" y1="150" x2="340" y2="190" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="400" y1="150" x2="560" y2="190" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>

  <text x="170" y="180" text-anchor="middle" font-size="10" fill="#5F5E5A">greeting</text>
  <text x="340" y="180" text-anchor="middle" font-size="10" fill="#5F5E5A">inquiry</text>
  <text x="510" y="180" text-anchor="middle" font-size="10" fill="#5F5E5A">high-intent</text>

  <rect x="40" y="190" width="150" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="115" y="213" text-anchor="middle" font-size="12" font-weight="bold" fill="#085041">Greeting Node</text>
  <text x="115" y="232" text-anchor="middle" font-size="10" fill="#0F6E56">Friendly reply, no RAG</text>

  <rect x="240" y="190" width="200" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="340" y="213" text-anchor="middle" font-size="12" font-weight="bold" fill="#0C447C">RAG Retrieval Node</text>
  <text x="340" y="232" text-anchor="middle" font-size="10" fill="#185FA5">Search KB → LLM answer</text>

  <rect x="490" y="190" width="160" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="570" y="213" text-anchor="middle" font-size="12" font-weight="bold" fill="#633806">Lead Capture Node</text>
  <text x="570" y="232" text-anchor="middle" font-size="10" fill="#854F0B">Collect name, email, platform</text>

  <line x1="340" y1="246" x2="340" y2="290" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="570" y1="246" x2="570" y2="290" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="220" y="290" width="240" height="56" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="340" y="313" text-anchor="middle" font-size="12" font-weight="bold" fill="#0C447C">Memory Update Node</text>
  <text x="340" y="332" text-anchor="middle" font-size="10" fill="#185FA5">Append to conversation history</text>

  <rect x="460" y="290" width="180" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="550" y="313" text-anchor="middle" font-size="12" font-weight="bold" fill="#633806">Slot Filling Check</text>
  <text x="550" y="332" text-anchor="middle" font-size="10" fill="#854F0B">name? email? platform?</text>

  <line x1="550" y1="346" x2="550" y2="390" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <text x="595" y="375" font-size="10" fill="#5F5E5A">all 3 → fire tool</text>
  <path d="M510 370 L460 370 L460 430 L500 430" fill="none" stroke="#BA7517" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <text x="430" y="395" text-anchor="end" font-size="10" fill="#5F5E5A">missing → ask next</text>

  <rect x="460" y="390" width="180" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="550" y="413" text-anchor="middle" font-size="12" font-weight="bold" fill="#712B13">Tool Execution Node</text>
  <text x="550" y="432" text-anchor="middle" font-size="10" fill="#993C1D">mock_lead_capture()</text>

  <line x1="340" y1="346" x2="340" y2="420" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="115" y1="246" x2="115" y2="420" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="550" y1="446" x2="400" y2="480" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="340" y1="420" x2="340" y2="480" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="115" y1="420" x2="290" y2="480" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="200" y="480" width="280" height="56" rx="8" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
  <text x="340" y="503" text-anchor="middle" font-size="12" font-weight="bold" fill="#27500A">Generate &amp; Stream Response</text>
  <text x="340" y="522" text-anchor="middle" font-size="10" fill="#3B6D11">Return text to user</text>

  <line x1="340" y1="536" x2="340" y2="570" stroke="#888780" stroke-width="1.2" marker-end="url(#arr)"/>
  <path d="M480 555 L600 555 L600 55 L430 55" fill="none" stroke="#888780" stroke-width="0.8" stroke-dasharray="5 3" marker-end="url(#arr)"/>
  <text x="630" y="310" font-size="10" fill="#5F5E5A">loop</text>

  <rect x="255" y="570" width="170" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="340" y="596" text-anchor="middle" font-size="12" font-weight="bold" fill="#2C2C2A">Wait for Next Input</text>
</svg>
