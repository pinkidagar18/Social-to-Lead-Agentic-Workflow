<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" style="background:#fff;font-family:Arial,sans-serif">
  <rect x="30" y="20" width="620" height="480" rx="20" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.8"/>
  <text x="340" y="50" text-anchor="middle" font-size="14" font-weight="bold" fill="#2C2C2A">AutoStream Conversational AI Agent</text>

  <rect x="60" y="70" width="560" height="70" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="340" y="97" text-anchor="middle" font-size="13" font-weight="bold" fill="#085041">Layer 1 – User Interface</text>
  <text x="340" y="116" text-anchor="middle" font-size="11" fill="#0F6E56">CLI / WhatsApp / any channel · receives raw text input</text>

  <line x1="340" y1="140" x2="340" y2="160" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="60" y="160" width="560" height="70" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="340" y="187" text-anchor="middle" font-size="13" font-weight="bold" fill="#3C3489">Layer 2 – LangGraph State Machine</text>
  <text x="340" y="206" text-anchor="middle" font-size="11" fill="#534AB7">Intent router · conversation memory · turn counter</text>

  <line x1="240" y1="230" x2="180" y2="260" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="340" y1="230" x2="340" y2="260" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="440" y1="230" x2="500" y2="260" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="60" y="260" width="160" height="70" rx="12" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="140" y="287" text-anchor="middle" font-size="12" font-weight="bold" fill="#0C447C">Layer 3a</text>
  <text x="140" y="306" text-anchor="middle" font-size="11" fill="#185FA5">Intent classifier</text>

  <rect x="250" y="260" width="180" height="70" rx="12" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="340" y="287" text-anchor="middle" font-size="12" font-weight="bold" fill="#712B13">Layer 3b</text>
  <text x="340" y="306" text-anchor="middle" font-size="11" fill="#993C1D">RAG pipeline</text>

  <rect x="460" y="260" width="160" height="70" rx="12" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="540" y="287" text-anchor="middle" font-size="12" font-weight="bold" fill="#633806">Layer 3c</text>
  <text x="540" y="306" text-anchor="middle" font-size="11" fill="#854F0B">Tool executor</text>

  <line x1="140" y1="330" x2="290" y2="360" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="340" y1="330" x2="340" y2="360" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="540" y1="330" x2="390" y2="360" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="150" y="360" width="380" height="70" rx="12" fill="#EAF3DE" stroke="#3B6D11" stroke-width="0.8"/>
  <text x="340" y="387" text-anchor="middle" font-size="13" font-weight="bold" fill="#27500A">Layer 4 – LLM Core (Claude 3 Haiku)</text>
  <text x="340" y="406" text-anchor="middle" font-size="11" fill="#3B6D11">Reasoning · response generation · grounding</text>

  <line x1="340" y1="430" x2="340" y2="455" stroke="#888780" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="200" y="455" width="280" height="44" rx="10" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="340" y="477" text-anchor="middle" font-size="13" font-weight="bold" fill="#085041">Final Response to User</text>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round"/>
    </marker>
  </defs>
</svg>
